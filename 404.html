<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="/assets/css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
    crossorigin="anonymous" referrerpolicy="no-referrer" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link id="favicon" rel="shortcut icon" href="/assets/images/misc/favicon1.png" type="image/x-png">
  <title>Page Not Found | Rasheeque</title>
  <style>
    .page-404 {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }
    .page-404 h1 {
      font-family: var(--font-heading);
      font-size: 15rem;
      font-weight: 700;
      background: var(--gradient-primary);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      line-height: 1;
      margin-bottom: 1rem;
    }
    .page-404 h3 {
      font-family: var(--font-heading);
      font-size: 2.8rem;
      color: var(--text-primary);
      margin-bottom: 1rem;
    }
    .page-404 p {
      font-size: 1.6rem;
      color: var(--text-secondary);
      margin-bottom: 3rem;
    }
  </style>
</head>
<body>

  <!-- Navbar -->
  <header>
    <a href="/" class="logo"><i class="fas fa-atom"></i> Rasheeque</a>
    <div id="menu" class="fas fa-bars"></div>
    <nav class="navbar">
      <ul>
        <li><a href="/#home">Home</a></li>
        <li><a href="/#about">About</a></li>
        <li><a href="/#skills">Skills</a></li>
        <li><a href="/#projects">Projects</a></li>
        <li><a href="/#contact">Contact</a></li>
      </ul>
    </nav>
  </header>

  <section class="page-404">
    <h1>404</h1>
    <h3>Oops! Page not found</h3>
    <p>The page you're looking for doesn't exist or has been moved.</p>
    <a href="/" class="btn btn-primary">
      <i class="fas fa-arrow-left"></i> Back to Home
    </a>
  </section>

  <footer>
    <div class="container">
      <div class="footer-bottom">
        <p>Designed with <i class="fas fa-heart" style="color: var(--accent-warm);"></i> by Rasheeque</p>
        <p>&copy; <span id="currentYear"></span> Rasheeque Ahammed Rahim. All Rights Reserved.</p>
      </div>
    </div>
  </footer>

  <script>
    const yearEl = document.getElementById('currentYear');
    if (yearEl) yearEl.textContent = new Date().getFullYear();

    const menuBtn = document.getElementById('menu');
    const nav = document.querySelector('.navbar');
    if (menuBtn && nav) {
      menuBtn.addEventListener('click', () => {
        menuBtn.classList.toggle('fa-bars');
        menuBtn.classList.toggle('fa-xmark');
        nav.classList.toggle('nav-toggle');
      });
    }
  </script>

</body>
</html>
